name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Install dependencies
        run: go mod tidy

      - name: Build EXE
        run: |
          mkdir dist
          go build -ldflags="-s -w" -o dist/site-blocker.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/site-blocker.exe
